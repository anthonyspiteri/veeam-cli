name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  python-dist:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Build distributions
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION: ${{ github.ref_name != '' && github.ref_name || '0.0.0' }}
        run: |
          export SETUPTOOLS_SCM_PRETEND_VERSION="${SETUPTOOLS_SCM_PRETEND_VERSION#v}"
          python -m pip install --upgrade pip
          python -m pip install build
          python -m build
          sha256sum dist/* > dist/SHA256SUMS.txt

      - name: Upload dist artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: python-dist
          path: dist/*

  binaries:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: bakufu-linux-x86_64
            asset_name: bakufu-linux-x86_64
            add_data: schemas:schemas
            binary_path: dist/bakufu
          - os: macos-latest
            artifact_name: bakufu-macos-arm64
            asset_name: bakufu-macos-arm64
            add_data: schemas:schemas
            binary_path: dist/bakufu
          - os: windows-latest
            artifact_name: bakufu-windows-x86_64
            asset_name: bakufu-windows-x86_64.exe
            add_data: schemas;schemas
            binary_path: dist/bakufu.exe
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Build binary
        shell: bash
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION: ${{ github.ref_name != '' && github.ref_name || '0.0.0' }}
        run: |
          export SETUPTOOLS_SCM_PRETEND_VERSION="${SETUPTOOLS_SCM_PRETEND_VERSION#v}"
          python -m pip install --upgrade pip
          python -m pip install -e . pyinstaller
          pyinstaller \
            --name bakufu \
            --onefile \
            --paths src \
            --add-data "${{ matrix.add_data }}" \
            src/bakufu_cli/__main__.py
          mkdir -p release
          cp "${{ matrix.binary_path }}" "release/${{ matrix.asset_name }}"

      - name: Upload binary artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ${{ matrix.artifact_name }}
          path: release/${{ matrix.asset_name }}

  publish:
    needs: [python-dist, binaries]
    runs-on: ubuntu-latest
    steps:
      - name: Download Python dist
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: python-dist
          path: release-assets

      - name: Download Linux binary
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: bakufu-linux-x86_64
          path: release-assets

      - name: Download macOS binary
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: bakufu-macos-arm64
          path: release-assets

      - name: Download Windows binary
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: bakufu-windows-x86_64
          path: release-assets

      - name: Generate release checksums
        run: |
          cd release-assets
          rm -f SHA256SUMS.txt
          sha256sum * > SHA256SUMS.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b
        with:
          files: |
            release-assets/*
          generate_release_notes: true
